<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Letreiro — Spelling Bee Português</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Outfit:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--honey:#f5a623;--honey-dk:#d4871a;--honey-lt:#ffeaa7;--comb:#fef3c7;--comb-b:#e5c76b;--center:#f59e0b;--center-dk:#d97706;--bg:#fffdf5;--tx:#3a2e1a;--tx-lt:#8a7a5a;--ok:#16a34a;--err:#dc2626}
body{background:var(--bg);font-family:'Outfit',sans-serif;color:var(--tx);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-y:auto;padding:0 16px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 30% 20%,rgba(245,166,35,.04)0,transparent 50%),radial-gradient(circle at 70% 80%,rgba(245,166,35,.03)0,transparent 40%);pointer-events:none;z-index:-1}
#app{max-width:440px;width:100%;display:flex;flex-direction:column;align-items:center;padding:20px 0 40px}
header{text-align:center;margin-bottom:14px;width:100%}
h1{font-family:'Fraunces',serif;font-size:32px;font-weight:900;letter-spacing:-.5px}
h1 span{color:var(--honey)}
#sub{font-size:13px;color:var(--tx-lt);margin-top:2px;font-weight:300}
#sbar{width:100%;margin:10px 0 6px;display:flex;flex-direction:column;gap:5px}
#rrow{display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:600}
#rlbl{color:var(--honey-dk);font-family:'Fraunces',serif;font-size:16px}
#plbl{color:var(--tx-lt);font-weight:400;font-size:13px}
#ptrack{width:100%;height:6px;background:#f0e6d0;border-radius:3px;position:relative}
#pfill{height:100%;background:linear-gradient(90deg,var(--honey),var(--center));border-radius:3px;transition:width .4s;width:0%}
#msg{height:28px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;transition:opacity .2s}
#msg.ok{color:var(--ok)}#msg.err{color:var(--err)}#msg.pg{color:var(--honey-dk);font-size:16px}
#inp{font-family:'Fraunces',serif;font-size:28px;font-weight:700;letter-spacing:2px;min-height:42px;display:flex;align-items:center;justify-content:center;margin:2px 0 8px;text-transform:uppercase}
#inp .cl{color:var(--honey-dk)}
#inp .cur{display:inline-block;width:2px;height:28px;background:var(--honey);margin-left:1px;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
#hc{display:flex;flex-direction:column;align-items:center;gap:6px;margin:6px 0 16px;user-select:none}
.hr{display:flex;gap:6px}
.hx{width:68px;height:72px;position:relative;cursor:pointer;transition:transform .1s}
.hx:active{transform:scale(.92)}
.hx svg{width:100%;height:100%}
.hb{fill:#f5edd5;stroke:var(--comb-b);stroke-width:1.5;transition:fill .15s}
.hx:hover .hb{fill:#ece2c8}
.hx.ct .hb{fill:var(--center);stroke:var(--center-dk);stroke-width:2}
.hx.ct:hover .hb{fill:var(--honey-dk)}
.hl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Fraunces',serif;font-size:26px;font-weight:900;color:var(--tx);pointer-events:none;text-transform:uppercase}
.hx.ct .hl{color:#fff}
#btns{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.bt{padding:10px 20px;border-radius:24px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;border:2px solid #d5c9a8;background:#fff;color:var(--tx)}
.bt:hover{background:#f5edd5;border-color:var(--comb-b)}
.bt:active{transform:scale(.96)}
.bt.pr{background:var(--honey);color:#fff;border-color:var(--honey-dk)}
.bt.pr:hover{background:var(--honey-dk)}
#fs{width:100%;border-top:1px solid #e8dfc8;padding-top:12px;margin-top:4px}
#fh{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:4px 0}
#fh h3{font-family:'Fraunces',serif;font-size:16px;font-weight:700}
#ft{font-size:18px;color:var(--tx-lt);transition:transform .2s}
#ft.op{transform:rotate(180deg)}
#fw{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0;max-height:0;overflow:hidden;transition:max-height .3s}
#fw.op{max-height:400px;overflow-y:auto}
.fd{padding:4px 10px;background:#f5edd5;border-radius:12px;font-size:13px;font-weight:600;text-transform:capitalize;animation:pop .3s}
.fd.pg{background:linear-gradient(135deg,var(--honey-lt),var(--honey));font-weight:700}
@keyframes pop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
#nb{width:100%;display:flex;justify-content:space-between;margin-bottom:4px;align-items:center}
.nb{background:none;border:none;font-size:13px;color:var(--tx-lt);cursor:pointer;font-family:'Outfit',sans-serif;text-decoration:underline;text-underline-offset:2px}
.nb:hover{color:var(--tx)}
#winfo{font-size:12px;color:var(--tx-lt);font-weight:300}
@media(max-width:380px){.hx{width:58px;height:62px}.hl{font-size:22px}#inp{font-size:24px}}
</style>
</head>
<body>
<div id="app">
<header><h1>Letr<span>eiro</span> 🐝</h1><div id="sub">Forma palavras com as letras do favo</div></header>
<div id="nb"><button class="nb" onclick="newGame()">Novo jogo</button><span id="winfo"></span></div>
<div id="sbar"><div id="rrow"><span id="rlbl">Iniciante</span><span id="plbl">0 pontos</span></div><div id="ptrack"><div id="pfill"></div></div></div>
<div id="msg">&nbsp;</div>
<div id="inp"><span class="cur"></span></div>
<div id="hc"></div>
<div id="btns">
<button class="bt" onclick="del()">⌫ Apagar</button>
<button class="bt" onclick="shuf()">🔀 Baralhar</button>
<button class="bt pr" onclick="submit()">Enviar</button>
</div>
<div id="fs">
<div id="fh" onclick="togF()"><h3>Palavras encontradas: <span id="fc">0</span></h3><span id="ft">▼</span></div>
<div id="fw"></div>
</div>
</div>

function sw(w,ls){
  if(w.length===4) return 1;
  let p=w.length;
  if(ls.every(l=>w.includes(l))) p+=7;
  return p;
}
function ip(w){return al.every(l=>w.includes(l));}

  const pz=PZ[i];
  cl=pz.c; ol=[...pz.o]; al=[cl,...ol];

  found=[]; sc=0; inp='';

  h.append(r1,r2,r3);
}
function mk(t,c){const e=document.createElement(t);e.className=c;return e;}
function hex(l,c){
  const d=mk('div','hx'+(c?' ct':''));
  d.innerHTML=HS+'<span class="hl">'+l.toUpperCase()+'</span>';
  d.addEventListener('click',()=>addL(l));
  return d;
}

function updInp(){
  const e=document.getElementById('inp');
  if(!inp){e.innerHTML='<span class="cur"></span>';return;}
  e.innerHTML=[...inp].map(c=>'<span class="'+(c===cl?'cl':'')+'">'+c.toUpperCase()+'</span>').join('')+'<span class="cur"></span>';
}
function addL(l){inp+=l;updInp();clrMsg();}
function del(){inp=inp.slice(0,-1);updInp();clrMsg();}

function submit(){
  const w=inp.toLowerCase();
  if(w.length<4){msg('Mínimo 4 letras','err');inp='';updInp();return;}
  if(!w.includes(cl)){msg('Tem de incluir a letra central','err');inp='';updInp();return;}
  if(![...w].every(c=>al.includes(c))){msg('Letra não permitida','err');inp='';updInp();return;}
  if(!vw.includes(w)){msg('Não está no dicionário','err');inp='';updInp();return;}
  if(found.includes(w)){msg('Já encontrada!','err');inp='';updInp();return;}
  
  found.push(w);
  const pts=sw(w,al);
  sc+=pts;
  
  if(ip(w)) msg('🎉 PANGRAMA! +'+pts+' pontos!','pg');
  else if(pts>=5) msg('Excelente! +'+pts+' pontos','ok');
  else if(w.length>=5) msg('Muito bem! +'+pts,'ok');
  else msg('+'+pts,'ok');
  
  inp=''; updInp(); updSc(); updFW();
}

let mt;
function msg(t,c){const e=document.getElementById('msg');e.textContent=t;e.className=c||'';clearTimeout(mt);mt=setTimeout(()=>{e.innerHTML='&nbsp;';e.className='';},2500);}
function clrMsg(){const e=document.getElementById('msg');e.innerHTML='&nbsp;';e.className='';}

function updSc(){
  const pct=mx>0?(sc/mx*100):0;
  document.getElementById('plbl').textContent=sc+' pontos';
  document.getElementById('pfill').style.width=Math.min(pct,100)+'%';
  let rk=RANKS[0];
  for(const r of RANKS) if(pct>=r.p) rk=r;
  document.getElementById('rlbl').textContent=rk.n;
}

function updFW(){
  document.getElementById('fc').textContent=found.length;
  const c=document.getElementById('fw');c.innerHTML='';
  const sorted=[...found].sort((a,b)=>{
    const ap=ip(a),bp=ip(b);
    if(ap&&!bp) return -1; if(!ap&&bp) return 1;
    return a.localeCompare(b,'pt');
  });
  sorted.forEach(w=>{
    const s=document.createElement('span');
    s.className='fd'+(ip(w)?' pg':'');
    s.textContent=w; c.appendChild(s);
  });
}

function togF(){
  document.getElementById('fw').classList.toggle('op');
  document.getElementById('ft').classList.toggle('op');
}

function shuf(){
  for(let i=ol.length-1;i>0;i--){const j=Math.random()*i+1|0;[ol[i],ol[j]]=[ol[j],ol[i]];}
  al=[cl,...ol]; buildHC();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){submit();return;}
  if(e.key==='Backspace'){del();e.preventDefault();return;}
  const k=e.key.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  if(k.length===1&&/[a-z]/.test(k)){
    if(al.includes(k)) addL(k);
    else msg('Letra não disponível','err');
  }
});

// Init with random puzzle
pi=Math.floor(Math.random()*PZ.length);
load(pi);
</script>
